services:
  postgres:
    image: postgres:16-alpine
    container_name: college-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: college_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d college_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: college-erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: college-erp-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@postgres:5432/college_erp?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: college-erp-worker
    restart: unless-stopped
    command: ["npm", "run", "worker", "-w", "apps/backend"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@postgres:5432/college_erp?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: college-erp-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
